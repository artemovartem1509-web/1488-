<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Мобильный чат</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#d9d9d9;
}

/* =========================
   REGISTRATION
========================= */

#registration-screen{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding-top:35px;
    background:#d9d9d9;
}

.registration-card{
    width:330px;
    background:#f3f1f1;
    border-radius:20px;
    padding:25px;
}

.input-group{
    margin-bottom:14px;
}

.input-field{
    width:100%;
    height:42px;
    border:none;
    border-radius:10px;
    background:#dddddd;
    padding:0 14px;
    outline:none;
    font-size:14px;
    font-weight:600;
    color:#555;
}

.input-field::placeholder{
    color:#777;
}

.terms-container{
    display:flex;
    align-items:flex-start;
    gap:10px;
    margin:12px 0;
}

.terms-container input{
    width:16px;
    height:16px;
    margin-top:2px;
}

.terms-text{
    font-size:11px;
    color:#777;
    font-weight:600;
    line-height:1.3;
}

.submit-btn{
    width:100%;
    height:42px;
    border:none;
    border-radius:10px;
    background:#58c44d;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

.error-message{
    color:red;
    font-size:12px;
    margin-top:10px;
    display:none;
}

/* =========================
   CHAT SCREEN
========================= */

#chat-screen{
    display:none;
    width:100%;
    min-height:100vh;
    background:#d9d9d9;
}

#chat-screen.visible{
    display:block;
}

/* SEARCH */

.top-bar{
    padding:10px;
}

.search-box{
    width:100%;
    height:42px;
    border:none;
    border-radius:12px;
    background:#f3f3f3;
    padding:0 14px;
    font-size:15px;
    outline:none;
}

/* TABS */

.tabs{
    display:flex;
    justify-content:space-around;
    background:#f5f5f5;
    margin:0 10px;
    padding:12px 0;
    border-radius:12px;
    font-weight:bold;
    font-size:15px;
}

/* CHAT LIST */

.chat-list{
    padding:20px 10px;
}

.chat-item{
    display:flex;
    align-items:center;
    margin-bottom:34px;
    cursor:pointer;
}

.avatar{
    width:54px;
    height:54px;
    border-radius:50%;
    background:#f3f3f3;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    margin-right:16px;
}

.chat-info{
    display:flex;
    flex-direction:column;
}

.chat-name{
    font-size:18px;
    font-weight:bold;
    margin-bottom:5px;
}

.chat-status{
    font-size:14px;
    font-weight:600;
}

/* FLOAT BUTTON */

.float-btn{
    position:fixed;
    right:15px;
    bottom:18px;
    width:46px;
    height:46px;
    border-radius:50%;
    background:#63d26b;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:26px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.hidden{
    display:none !important;
}

</style>
</head>

<body>

<!-- REGISTRATION -->

<div id="registration-screen">

    <div class="registration-card">

        <form id="registrationForm">

            <div class="input-group">

                <input
                type="text"
                class="input-field"
                id="fullname"
                placeholder="Ф.И.О.">

            </div>

            <div class="input-group">

                <input
                type="tel"
                class="input-field"
                id="phone"
                placeholder="Введите номер телефона">

            </div>

            <div class="terms-container">

                <input type="checkbox" id="agreement">

                <label class="terms-text">
                    вы соглашаетесь с политикой конфиденциальности
                </label>

            </div>

            <div class="terms-container">

                <input type="checkbox">

                <label class="terms-text">
                    запомнить меня
                </label>

            </div>

            <button type="submit" class="submit-btn">
                Зарегистрироваться
            </button>

            <div id="errorMessage" class="error-message">
                Заполните все поля
            </div>

        </form>

    </div>

</div>

<!-- CHAT -->

<div id="chat-screen">

    <!-- SEARCH -->

    <div class="top-bar">

        <input
        type="text"
        class="search-box"
        placeholder="🔍   Поиск чатов..."
        >

    </div>

    <!-- TABS -->

    <div class="tabs">

        <div>Чаты</div>

        <div>Каналы</div>

        <div>Приложения</div>

    </div>

    <!-- CHAT LIST -->

    <div class="chat-list">

        <div class="chat-item">

            <div class="avatar">к</div>

            <div class="chat-info">

                <div class="chat-name">
                    Кирилл трамп
                </div>

                <div class="chat-status">
                    был(а) недавно
                </div>

            </div>

        </div>

        <div class="chat-item">

            <div class="avatar">с</div>

            <div class="chat-info">

                <div class="chat-name">
                    Серега гараж
                </div>

                <div class="chat-status">
                    был(а) недавно
                </div>

            </div>

        </div>

        <div class="chat-item">

            <div class="avatar">н</div>

            <div class="chat-info">

                <div class="chat-name">
                    Никита
                </div>

                <div class="chat-status">
                    был(а) недавно
                </div>

            </div>

        </div>

    </div>

    <!-- FLOAT BUTTON -->

    <div class="float-btn">
        💬
    </div>

</div>

<script>

const registrationForm =
document.getElementById('registrationForm');

const registrationScreen =
document.getElementById('registration-screen');

const chatScreen =
document.getElementById('chat-screen');

const errorMessage =
document.getElementById('errorMessage');

registrationForm.addEventListener('submit', function(e){

    e.preventDefault();

    const fullname =
    document.getElementById('fullname').value;

    const phone =
    document.getElementById('phone').value;

    const agreement =
    document.getElementById('agreement').checked;

    if(
        fullname === '' ||
        phone === '' ||
        !agreement
    ){
        errorMessage.style.display='block';
        return;
    }

    registrationScreen.classList.add('hidden');

    chatScreen.classList.add('visible');

});

</script>

</body>
</html>
