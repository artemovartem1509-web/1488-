<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Регистрация</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#d9d9d9;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* PHONE */

.phone{
    width:390px;
    height:844px;
    background:#d9d9d9;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding-top:35px;
}

/* CARD */

.registration-card{
    width:330px;
    background:#f3f1f1;
    border-radius:20px;
    padding:25px;
}

/* INPUTS */

.input-group{
    margin-bottom:14px;
}

.input-field{
    width:100%;
    height:42px;
    border:none;
    border-radius:10px;
    background:#dddddd;
    padding:0 14px;
    outline:none;
    font-size:14px;
    font-weight:600;
    color:#555;
}

.input-field::placeholder{
    color:#777;
}

/* CHECKBOX */

.terms-container{
    display:flex;
    align-items:flex-start;
    gap:10px;
    margin:12px 0;
}

.terms-container input{
    width:16px;
    height:16px;
    margin-top:2px;
}

.terms-text{
    font-size:11px;
    color:#777;
    font-weight:600;
    line-height:1.3;
}

/* BUTTON */

.submit-btn{
    width:100%;
    height:42px;
    border:none;
    border-radius:10px;
    background:#58c44d;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
    transition:0.3s;
}

.submit-btn:hover{
    background:#4eb343;
}

</style>
</head>

<body>

<div class="phone">

    <div class="registration-card">

        <form>

            <div class="input-group">
                <input
                    type="text"
                    class="input-field"
                    placeholder="Введите имя пользователя"
                >
            </div>

            <div class="input-group">
                <input
                    type="text"
                    class="input-field"
                    placeholder="Ф.И.О."
                >
            </div>

            <div class="input-group">
                <input
                    type="tel"
                    class="input-field"
                    placeholder="Введите номер телефона"
                >
            </div>

            <div class="terms-container">

                <input type="checkbox">

                <label class="terms-text">
                    вы соглашаетесь с политикой конфиденциальности
                </label>

            </div>

            <div class="terms-container">

                <input type="checkbox">

                <label class="terms-text">
                    запомнить меня
                </label>

            </div>

            <button class="submit-btn">
                Зарегистрироваться
            </button>

        </form>

    </div>

</div>

</body>
</html>
